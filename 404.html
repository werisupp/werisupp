<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ページが見つかりません | うぇりサポ</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    .not-found-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: 2rem;
    }
    .not-found-wrap h1 {
      font-size: 4rem;
      color: #ccc;
      margin-bottom: 0.5rem;
    }
    .not-found-wrap p {
      font-size: 1.1rem;
      color: #666;
      margin-bottom: 2rem;
    }
    .not-found-wrap a {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #01696f;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
    }
    .not-found-wrap a:hover {
      background: #0c4e54;
    }
  </style>
</head>
<body class="pub-page-body">

  <div class="pub-header">
    <div style="display:flex; align-items:center; gap:15px;">
      <span class="pub-header-title">うぇりサポ</span>
    </div>
    <div class="pub-header-right">
      <a href="./index.html">ログイン</a>
    </div>
  </div>

  <div class="not-found-wrap">
    <h1>404</h1>
    <p>お探しのページは見つかりませんでした。</p>
    <a href="./index.html">トップページに戻る</a>
  </div>

</body>
</html>
